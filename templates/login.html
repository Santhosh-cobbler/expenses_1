<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication System</title>

    <style>
        /* Modern Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F5D1AE; /* Your original background */
            display: flex;
            justify-content: center;
            align-items: center; /* Center vertically */
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: #F4EDEA;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .cardTitle {
            font-size: 28px;
            font-weight: 700;
            color: #3a3a3a;
            margin-bottom: 10px;
        }

        .cardSubtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .form {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .form input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #e0d8d5;
            background-color: white;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .form input:focus {
            border-color: #c58f63; /* Matches your button */
        }

        .btns {
            display: flex;
            flex-direction: column; /* Stacked looks cleaner on mobile */
            gap: 12px;
            margin-top: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: #c58f63;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #b07c52;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }

        .register-link a {
            color: #3a3a3a;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid #c58f63;
        }

        .register-link a:hover {
            color: #c58f63;
        }

    </style>
</head>
<body>

    <div class="card">
        <p class="cardTitle">Welcome Back</p>
        <p class="cardSubtitle">Please enter your details to sign in</p>

        <form method="POST" class="form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@company.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="btns">
                <button type="submit">Login</button>
            </div>
        </form>

        <div class="register-link">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>

</body>
</html>
