<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Data | Document Yourself</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c58f63;
            --primary-hover: #b07c52;
            --dark: #2d2d2d;
            --bg: #f8f9fa;
            --border: #eee;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .cardTitle {
            font-size: 24px;
            font-weight: 600;
            color: var(--dark);
            margin: 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .back-btn {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            background-color: var(--primary);
            color: white;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: var(--primary-hover);
        }

        .logout-btn {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            background-color: #f8f9fa;
            color: #666;
            border: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1.5px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: #fafafa;
        }

        th {
            padding: 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 1.5px solid var(--border);
        }

        td {
            padding: 16px;
            font-size: 14px;
            color: var(--dark);
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .badge {
            background: #fdf5ef;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1 class="cardTitle">Documented Records</h1>
            <div class="btn-group">
                <a href="{{ url_for('home') }}" class="back-btn">+ Add New</a>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>File Name</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% if entries %}
                        {% for entry in entries %}
                        <tr>
                            <td>{{ entry.entry_date }}</td>
                            <td><span class="badge">{{ entry.category }}</span></td>
                            <td>{{ entry.file_name }}</td>
                            <td style="color: #27ae60; font-weight: 600;">Active</td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: #888;">
                                No records found in your vault.
                            </td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
