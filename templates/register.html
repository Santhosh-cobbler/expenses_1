<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Authentication System</title>

    <style>
        /* Shared Styles from Login */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F5D1AE; 
            display: flex;
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: #F4EDEA;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .cardTitle {
            font-size: 28px;
            font-weight: 700;
            color: #3a3a3a;
            margin-bottom: 10px;
        }

        .cardSubtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .form {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group {
            margin-bottom: 18px; /* Slightly tighter for more fields */
        }

        .form label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
        }

        .form input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #e0d8d5;
            background-color: white;
            transition: border-color 0.3s ease;
            outline: none;
            font-size: 14px;
        }

        .form input:focus {
            border-color: #c58f63;
        }

        .btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: #3a3a3a; /* Darker accent for "Register" to distinguish it */
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #222;
            transform: translateY(-1px);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }

        .login-link a {
            color: #c58f63;
            text-decoration: none;
            font-weight: 700;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="card">
        <p class="cardTitle">Join Us</p>
        <p class="cardSubtitle">Create an account to get started</p>

        <form action="/register" method="POST" class="form">
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@company.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat password" required>
            </div>

            <div class="btns">
                <button type="submit">Create Account</button>
            </div>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>

</body>
</html>
