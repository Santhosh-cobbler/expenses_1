<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Yourself | Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c58f63;
            --primary-hover: #b07c52;
            --dark: #2d2d2d;
            --bg: #f8f9fa;
            --text: #4a4a4a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .cardTitle {
            font-size: 28px;
            font-weight: 600;
            color: var(--dark);
            margin: 0 0 10px 0;
            text-align: center;
        }

        .cardSubtitle {
            font-size: 14px;
            color: #888;
            text-align: center;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid #eee;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(197, 143, 99, 0.1);
        }

        .btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: var(--primary);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .view-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            background-color: var(--dark);
            color: white;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .view-link:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="cardTitle">Document Yourself</h1>
        <p class="cardSubtitle">Keep your digital assets organized.</p>
        
        <form method="POST" class="all-content-form">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <input type="text" name="category" placeholder="e.g. AI, Branding, Finance" required>
            </div>

            <div class="form-group">
                <label>File Name</label>
                <input type="text" name="file-name" placeholder="e.g. Architecture-V1">
            </div>

            <div class="btns">
                <button type="submit">Submit File</button>
                <a href="/view-db" class="view-link">View Data</a>
            </div>
        </form>
    </div>

</body>
</html>
